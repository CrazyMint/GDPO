data:
  tokenizer: null
  train_files: ~/data/rlhf/gsm8k/train.parquet
  val_files: ~/data/rlhf/gsm8k/test.parquet
  prompt_key: prompt
  max_prompt_length: 512
  max_response_length: 512
  train_batch_size: 1024
  val_batch_size: 1312
  return_raw_input_ids: False  # This should be set to true when the tokenizer between policy and rm differs
  return_raw_chat: False

actor_rollout_ref:
  hybrid_engine: True
  model:
    path: ~/models/deepseek-llm-7b-chat
    external_lib: null
    override_config: { }
    enable_gradient_checkpointing: False
    use_remove_padding: False
  actor:
    strategy: fsdp  # This is for backward-compatibility
    ppo_mini_batch_size: 256
    ppo_micro_batch_size: 64
    use_dynamic_bsz: False
    ppo_max_token_len_per_gpu: 16384 # n * ${data.max_prompt_length} + ${data.max_response_length}
    grad_clip: 1.0
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    entropy_coeff: 0.001
    use_kl_loss: False # True for GRPO
    kl_loss_coef: 0.001 # for grpo
    kl_loss_type: low_var_kl # for grpo
    ppo_epochs: 1
    shuffle: False
    ulysses_sequence_parallel_size: 1 # sp size
    optim:
      lr: 1e-6
      lr_warmup_steps_ratio: 0.  # the total steps will be injected during runtime
      min_lr_ratio: null   # only useful for warmup with cosine
      warmup_style: constant  # select from constant/cosine
      total_training_steps: -1  # must be override by program
    fsdp_config:
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
      param_offload: False
      grad_offload: False
      optimizer_offload: False
      fsdp_size: -1
  ref:
    fsdp_config:
      param_offload: False
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
      fsdp_size: -1
    log_prob_micro_batch_size: 128
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    ulysses_sequence_parallel_size: ${actor_rollout_ref.actor.ulysses_sequence_parallel_size} # sp size
  rollout:
    name: vllm
    temperature: 1.0
    top_k: -1 # 0 for hf rollout, -1 for vllm rollout
    top_p: 1
    prompt_length: ${data.max_prompt_length}  # not use for opensource
    response_length: ${data.max_response_length}
    # for vllm rollout
    dtype: bfloat16 # should align with FSDP
    gpu_memory_utilization: 0.5
    ignore_eos: False
    enforce_eager: True
    free_cache_engine: True
    load_format: dummy_dtensor
    tensor_model_parallel_size: 2
    max_num_batched_tokens: 8192
    max_num_seqs: 1024
    log_prob_micro_batch_size: 128
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    # for hf rollout
    do_sample: True
    # number of responses (i.e. num sample times)
    n: 1 # > 1 for grpo
    # Validation sampling parameters
    val_kwargs:
      n: 1  # number of samples per prompt during validation
      do_sample: False  # greedy by default for deterministic eval
      temperature: 1.0
      top_k: -1
      top_p: 1.0
      max_tokens: null  # null means use data.max_response_length; set lower for memory savings

critic:
  strategy: fsdp
  optim:
    lr: 1e-5
    lr_warmup_steps_ratio: 0.  # the total steps will be injected during runtime
    min_lr_ratio: null   # only useful for warmup with cosine
    warmup_style: constant  # select from constant/cosine
    total_training_steps: -1  # must be override by program
  model:
    path: ~/models/deepseek-llm-7b-chat
    tokenizer_path: ${actor_rollout_ref.model.path}
    override_config: { }
    external_lib: ${actor_rollout_ref.model.external_lib}
    enable_gradient_checkpointing: False
    use_remove_padding: False
    fsdp_config:
      param_offload: False
      grad_offload: False
      optimizer_offload: False
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
      fsdp_size: -1
  ppo_mini_batch_size: ${actor_rollout_ref.actor.ppo_mini_batch_size}
  ppo_micro_batch_size: 64
  forward_micro_batch_size: ${critic.ppo_micro_batch_size}
  use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
  ppo_max_token_len_per_gpu: 32768 # (${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}) * 2
  forward_max_token_len_per_gpu: ${critic.ppo_max_token_len_per_gpu}
  ulysses_sequence_parallel_size: 1 # sp size
  ppo_epochs: ${actor_rollout_ref.actor.ppo_epochs}
  shuffle: ${actor_rollout_ref.actor.shuffle}
  grad_clip: 1.0
  cliprange_value: 0.5

reward_model:
  enable: False
  strategy: fsdp
  model:
    input_tokenizer: ${actor_rollout_ref.model.path}  # set this to null if the chat template is identical
    path: ~/models/FsfairX-LLaMA3-RM-v0.1
    external_lib: ${actor_rollout_ref.model.external_lib}
    use_remove_padding: False
    fsdp_config:
      min_num_params: 0
      param_offload: False
  micro_batch_size: 64
  max_length: null
  ulysses_sequence_parallel_size: 1 # sp size
  use_dynamic_bsz: ${critic.use_dynamic_bsz}
  forward_max_token_len_per_gpu: ${critic.forward_max_token_len_per_gpu}

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: gae  # Options: gae, grpo, gdpo, dgdo, dgdo2
  kl_penalty: kl  # how to estimate kl divergence
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
  # GDPO static weights for [correctness, format, length] (only used when adv_estimator=gdpo)
  gdpo_weights: null  # e.g. [0.8, 0.2] for correctness=0.8, format=0.2
  # DGDO hyperparameters (only used when adv_estimator=dgdo)
  dgdo_beta: 0.9      # EMA momentum for weight smoothing (0.8-0.99)
  dgdo_epsilon: 1e-6  # Stability constant for instability computation
  dgdo_warmup_steps: 0  # Steps before applying DGDO weighting
  dgdo_beta_start: 0.5  # Initial beta for warmup
  dgdo_beta_warmup_steps: 0  # Steps to warmup beta from start to target
  dgdo_min_weight: 0.0  # Minimum weight floor for samples
  # DGDO2 hyperparameters (only used when adv_estimator=dgdo2)
  # Potential-weighted instability: D_k = CV_k * (1 - (mu_k - R_min) / (R_max - R_min))^alpha
  # Reward bounds set via env vars: DGDO2_BOUNDS_CORRECTNESS="-3.0,3.0" etc.
  dgdo2_alpha: 1.0          # Potential decay exponent
  dgdo2_beta: 0.9           # EMA momentum for weight smoothing
  dgdo2_epsilon: 1e-6       # Stability constant
  dgdo2_warmup_steps: 0     # Steps before applying DGDO2 weighting
  dgdo2_beta_start: 0.5     # Initial beta for warmup schedule
  dgdo2_beta_warmup_steps: 0
  dgdo2_min_weight: 0.0     # Minimum weight floor
  # DGDO-Eff hyperparameters (only used when adv_estimator=dgdo_eff)
  # Online per-problem L* from correct rollouts; asymmetric D_k (Verbosity Potential for efficiency)
  dgdo_eff_alpha: 1.0       # Potential decay exponent
  dgdo_eff_beta: 0.95       # EMA momentum for weight smoothing
  dgdo_eff_epsilon: 1e-8    # Stability constant
  dgdo_eff_bmax: 8000       # Fallback L* when no correct rollouts exist (match max_response_length)
  dgdo_eff_w_min: 0.3       # Minimum weight floor for correctness
  dgdo_eff_lstar_mode: 'max_asym'  # 'max_asym': L*=max, correct>=0/incorrect<=0; 'max_sym': L*=max, symmetric |l-L*|/L*
  # filter_groups config for DAPO support
  filter_groups:
    enable: false
    metric: null
    max_num_gen_batches: 0

trainer:
  total_epochs: 30
  total_training_steps: null
  project_name: verl_examples
  experiment_name: gsm8k
  logger: [ 'console', 'wandb' ]
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: -1
  test_freq: -1
  critic_warmup: 0
  default_hdfs_dir: null
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  # Checkpoint resume settings
  resume_mode: auto  # Options: auto, disable, resume_path
  resume_from_path: null  # Path to resume from (only used when resume_mode is "resume_path")
  # Wandb settings
  wandb_kwargs:
    resume: allow  # Options: allow, must, never, auto
